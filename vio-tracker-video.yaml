# Same as vio-tracker.yaml but lower track_high_thresh so top-down / low-conf person detections still get tracked.
# realtime-tracker keeps using vio-tracker.yaml (0.5).
#
# Remember everyone in the video: track_buffer = frames to keep a lost track alive.
# Set very high so the same person keeps the same ID no matter when they reappear.
# 999999 frames ≈ 9+ hours at 30 fps; increase if your video is longer.
tracker_type: botsort
track_high_thresh: 0.5
track_low_thresh: 0.1
new_track_thresh: 0.95
track_buffer: 20000
match_thresh: 0.2
fuse_score: true
gmc_method: sparseOptFlow
proximity_thresh: 0.3
appearance_thresh: 0.3
with_reid: true
model: auto
