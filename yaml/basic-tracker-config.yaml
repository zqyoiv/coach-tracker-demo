# Tuned so one person keeps one ID: long buffer, reluctant to create new tracks, loose ReID matching.
tracker_type: botsort
track_high_thresh: 0.5
track_low_thresh: 0.1
new_track_thresh: 0.95
track_buffer: 20000
match_thresh: 0.4
fuse_score: true
gmc_method: sparseOptFlow
proximity_thresh: 0.3
appearance_thresh: 0.3
with_reid: true
model: auto
